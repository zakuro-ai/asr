name: Auto-release

on:
  push:
    branches: [master, main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "notebooks/**"
      - ".github/workflows/*.yml"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  bump-and-release:
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          # RELEASE_TOKEN must be a PAT with 'contents: write' whose owner is
          # listed under Settings → Branches → Allow specified actors to bypass
          # required pull requests.  Without it the push is blocked by the
          # "Changes must be made through a pull request" branch-protection rule.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          set -euo pipefail
          CURRENT=$(grep -E '^__version__ = ' asr_deepspeech/__init__.py | sed -E 's/.*"([^"]+)".*/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "  current: $CURRENT"
          echo "  new    : $NEW"
          sed -i.bak -E "s/^__version__ = \".*\"/__version__ = \"$NEW\"/" asr_deepspeech/__init__.py
          rm asr_deepspeech/__init__.py.bak
          sed -i "s/^  version:[[:space:]]*v[0-9.]*$/  version:                  v${NEW}/" asr_deepspeech/config.yml
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit + tag
        run: |
          set -euo pipefail
          git add asr_deepspeech/__init__.py asr_deepspeech/config.yml
          git commit -m "chore(release): v${{ steps.bump.outputs.new_version }} [skip release]"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --generate-notes

  publish-pypi:
    needs: bump-and-release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ needs.bump-and-release.outputs.tag }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Build wheel + sdist
        run: |
          pip install build
          python -m build --outdir dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
