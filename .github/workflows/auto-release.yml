name: Auto-release

on:
  push:
    branches: [master, main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "notebooks/**"
      - ".github/workflows/*.yml"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  bump-and-release:
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      # RELEASE_TOKEN must be a fine-grained PAT from a repo admin (enforce_admins: false
      # means admin tokens bypass the PR-review branch protection on master).
      # Create at: github.com → Settings → Developer settings → Fine-grained tokens
      # Permissions needed: Contents (read & write) on this repo.
      # Store as: Settings → Secrets → Actions → RELEASE_TOKEN
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          set -euo pipefail
          CURRENT=$(grep -E '^__version__ = ' asr_deepspeech/__init__.py | sed -E 's/.*"([^"]+)".*/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "  current: $CURRENT"
          echo "  new    : $NEW"
          sed -i.bak -E "s/^__version__ = \".*\"/__version__ = \"$NEW\"/" asr_deepspeech/__init__.py
          rm asr_deepspeech/__init__.py.bak
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit + tag
        run: |
          set -euo pipefail
          git add asr_deepspeech/__init__.py
          git commit -m "chore(release): v${{ steps.bump.outputs.new_version }} [skip release]"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --generate-notes

  publish-pypi:
    needs: bump-and-release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          ref: ${{ needs.bump-and-release.outputs.tag }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Build wheel + sdist
        run: |
          pip install build
          python -m build --outdir dist

      - name: Generate SBOM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment -o sbom.json
          gh release upload "${{ needs.bump-and-release.outputs.tag }}" sbom.json --clobber

      # Temporarily disabled: PyPI Trusted Publishing rejects the OIDC token
      # ("invalid-publisher": no matching publisher configured on pypi.org for
      # this repo/workflow/environment). A request is open with PyPI; until they
      # provision the trusted publisher, this step would fail every release and
      # block the pipeline. Re-enable by uncommenting once PyPI confirms.
      # - name: Publish to PyPI
      #   uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
